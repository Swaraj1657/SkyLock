<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLock — Verify Email</title>
    <meta name="description" content="Verify your SkyLock email address.">
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>

    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-icon">S</div>
            <h1>SkyLock</h1>
        </div>

        <p class="auth-subtitle">Email Verification</p>

        <p class="auth-description">
            Please verify your email to activate your account. Click the button below to receive a verification link.
        </p>

        <form class="auth-form" action="/send-verification" method="post">
            <button type="submit" class="auth-submit">Send Verification Link</button>
        </form>

        <p class="auth-link" style="margin-top: 12px; font-size: 0.78rem; color: rgba(255,255,255,0.45);">
            Resend available after 2 minutes.
        </p>

        <p class="auth-link">
            <a href="/loginPage">Back to Sign In</a>
        </p>
    </div>

</body>

</html>
