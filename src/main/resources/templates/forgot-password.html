<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLock — Forgot Password</title>
    <meta name="description" content="Reset your SkyLock cloud storage password.">
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>

    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-icon">S</div>
            <h1>SkyLock</h1>
        </div>

        <p class="auth-subtitle">Forgot your password?</p>

        <p class="auth-description">
            Enter your username or email address and we'll send you a link to reset your password.
        </p>

        <!-- Success message -->
        <div class="auth-success" th:if="${param.success}">
            Reset link sent to your email. Please check your inbox.
        </div>

        <!-- Error message -->
        <div class="auth-error" th:if="${param.error}">
            User not found or email could not be sent.
        </div>

        <form class="auth-form" th:action="@{/forgotPassword}" method="post">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
            </div>

            <button type="submit" class="auth-submit">Send Reset Link</button>
        </form>

        <p class="auth-link">
            Remember your password? <a href="/loginPage">Sign in</a>
        </p>
    </div>

</body>

</html>
