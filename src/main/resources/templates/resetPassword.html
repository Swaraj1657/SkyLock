<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLock — Reset Password</title>
    <meta name="description" content="Reset your SkyLock account password.">
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>

    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-icon">S</div>
            <h1>SkyLock</h1>
        </div>

        <p class="auth-subtitle">Create a new password</p>

        <p class="auth-description">
            Enter your new password below. Make sure it's strong and secure.
        </p>

        <!-- Error message -->
        <div class="auth-error" th:if="${param.error}">
            Password reset failed. Passwords may not match or the link has expired.
        </div>

        <!-- Success message -->
        <div class="auth-success" th:if="${param.success}">
            Password successfully changed! You can now sign in.
        </div>

        <form class="auth-form" th:action="@{/resetPassword}" method="post">
            <input type="hidden" name="token" th:value="${token}" />

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter new password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password"
                    required>
            </div>

            <button type="submit" class="auth-submit">Reset Password</button>
        </form>

        <p class="auth-link">
            <a href="/loginPage">Back to Sign In</a>
        </p>
    </div>

</body>

</html>
